<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Moderador - StreamGames</title><style>:root{--pink:#ff2d55;--purple:#7c3aed;--dark:#0a0a14;--card:#13131f;--card2:#1a1a2e;--text:#f0f0f0;--muted:#666;--border:rgba(255,255,255,0.07);--success:#22c55e;--danger:#ef4444;--gold:#fbbf24;--grad:linear-gradient(135deg,#ff2d55,#7c3aed)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(124,58,237,.15) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(255,45,85,.12) 0%,transparent 55%);pointer-events:none;z-index:0}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

/* NAV */
.nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;background:rgba(10,10,20,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-size:1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-badge{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3);letter-spacing:.04em;text-transform:uppercase}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;transition:all .3s;flex-shrink:0}
.nav-dot.on{background:var(--success);box-shadow:0 0 10px var(--success),0 0 20px rgba(34,197,94,.3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--success),0 0 16px rgba(34,197,94,.3)}50%{box-shadow:0 0 14px var(--success),0 0 28px rgba(34,197,94,.5)}}

/* CONNECT BAR */
.conn-bar{padding:12px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;position:relative;z-index:1}
.conn-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:.875rem;outline:none;transition:border-color .2s}
.conn-input:focus{border-color:var(--purple)}
.conn-input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.82rem;font-weight:700;transition:all .2s;white-space:nowrap;position:relative;overflow:hidden;user-select:none}
.btn::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.btn:active::after{background:rgba(255,255,255,.08)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 2px 16px rgba(255,45,85,.3)}
.btn-primary:hover{box-shadow:0 4px 24px rgba(255,45,85,.5);transform:translateY(-1px)}
.btn-success{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.btn-success:hover{background:rgba(34,197,94,.25)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-full{width:100%}
.btn-lg{padding:14px 20px;font-size:.95rem;border-radius:12px}

/* SECTIONS */
.page{padding:0 0 80px;position:relative;z-index:1}
.sec{padding:18px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

/* CURRENT Q */
.cq-card{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08));border:1px solid rgba(124,58,237,.25);border-radius:14px;padding:16px;margin-bottom:12px}
.cq-text{font-size:1rem;font-weight:700;line-height:1.45;margin-bottom:12px;color:var(--text)}
.cq-opts{display:flex;flex-direction:column;gap:6px}
.cq-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--border);font-size:.82rem;transition:all .2s}
.cq-opt.correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:var(--success)}
.cq-opt-letter{font-weight:900;color:var(--purple);min-width:18px;font-size:.85rem}
.cq-opt-text{flex:1}
.cq-empty{text-align:center;padding:20px;color:var(--muted);font-size:.82rem}

/* CONTROL GRID */
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ctrl-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* FORM */
.fg{margin-bottom:12px}
.fl{font-size:.72rem;color:var(--muted);font-weight:600;margin-bottom:5px;display:block;letter-spacing:.03em}
.fi{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:.875rem;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--purple)}
.fi::placeholder{color:var(--muted)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.5}
select.fi{cursor:pointer}

/* OPTIONS GRID */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt-wrap{position:relative}
.opt-ltr{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.72rem;font-weight:900;color:var(--purple);pointer-events:none}
.opt-fi{padding-left:28px!important}

/* QUEUE */
.q-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.q-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;font-size:.78rem;animation:fadeIn .2s ease}
.q-item-num{font-weight:800;color:var(--purple);min-width:20px;font-size:.75rem}
.q-item-text{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:2px 5px;border-radius:5px;transition:all .2s;flex-shrink:0}
.q-item-del:hover{color:var(--danger);background:rgba(239,68,68,.1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CHAT */
.chat-feed{height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:4px 0}
.cm{display:flex;gap:7px;align-items:flex-start;font-size:.78rem;animation:fadeIn .2s ease}
.cm-av{width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px}
.cm-u{font-weight:700;color:#a78bfa;margin-right:4px}
.cm-t{color:var(--text);word-break:break-word}

/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;transition:background .2s;cursor:default}
.lb-item:hover{background:rgba(255,255,255,.04)}
.lb-rank{min-width:26px;text-align:center;font-size:.9rem}
.lb-av{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff;flex-shrink:0}
.lb-user{flex:1;font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pts{font-weight:800;font-size:.85rem}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:.82rem;font-weight:500;z-index:9999;animation:toastIn .3s ease;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--purple)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.tab{flex:1;padding:11px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s;letter-spacing:.03em}
.tab.active{color:var(--text);border-bottom-color:var(--purple);background:rgba(124,58,237,.08)}
.tab-content{display:none}
.tab-content.active{display:block}

/* STATS BAR */
.stats-bar{display:flex;gap:0;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.stat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:.95rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}</style></head><nav class="nav">
  <span class="nav-logo">StreamGames</span>
  <span class="nav-badge">Moderador</span>
  <div class="nav-dot" id="navDot"></div>
</nav>

<div class="conn-bar">
  <input class="conn-input" id="usernameInput" placeholder="@usuario TikTok" autocomplete="off">
  <button class="btn btn-primary" id="connectBtn" onclick="connectTikTok()">Conectar</button>
  <button class="btn btn-danger" id="disconnectBtn" onclick="disconnectTikTok()" style="display:none">Salir</button>
</div>

<div class="page">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sMsgs">0</div><div class="stat-lbl">Msgs</div></div>
    <div class="stat"><div class="stat-val" id="sLikes">0</div><div class="stat-lbl">Likes</div></div>
    <div class="stat"><div class="stat-val" id="sFollows">0</div><div class="stat-lbl">Follows</div></div>
    <div class="stat"><div class="stat-val" id="sQuestions">0</div><div class="stat-lbl">Preguntas</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('trivia',this)">Trivia</button>
    <button class="tab" onclick="switchTab('chat',this)">Chat</button>
    <button class="tab" onclick="switchTab('ranking',this)">Ranking</button>
  </div>

  <!-- TAB: TRIVIA -->
  <div id="tab-trivia" class="tab-content active">
    <div class="sec">
      <div class="sec-title">Pregunta activa</div>
      <div id="cqCard" class="cq-card" style="display:none">
        <div class="cq-text" id="cqText"></div>
        <div class="cq-opts" id="cqOpts"></div>
      </div>
      <div class="cq-empty" id="cqEmpty">Sin pregunta activa</div>
      <div class="ctrl-grid">
        <button class="btn btn-success btn-lg" onclick="revealAnswer()">Revelar</button>
        <button class="btn btn-primary btn-lg" onclick="nextQuestion()">Siguiente</button>
      </div>
      <div class="ctrl-grid-3" style="margin-top:8px">
        <button class="btn btn-secondary" onclick="startTimer(20)">20s</button>
        <button class="btn btn-secondary" onclick="startTimer(30)">30s</button>
        <button class="btn btn-secondary" onclick="startTimer(60)">60s</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Agregar pregunta</div>
      <div class="card">
        <div class="fg">
          <label class="fl">Pregunta</label>
          <textarea class="fi" id="qText" placeholder="Escribe la pregunta..."></textarea>
        </div>
        <div class="opts-grid">
          <div class="opt-wrap"><span class="opt-ltr">A</span><input class="fi opt-fi" id="optA" placeholder="Opcion A"></div>
          <div class="opt-wrap"><span class="opt-ltr">B</span><input class="fi opt-fi" id="optB" placeholder="Opcion B"></div>
          <div class="opt-wrap"><span class="opt-ltr">C</span><input class="fi opt-fi" id="optC" placeholder="Opcion C"></div>
          <div class="opt-wrap"><span class="opt-ltr">D</span><input class="fi opt-fi" id="optD" placeholder="Opcion D"></div>
        </div>
        <div class="fg">
          <label class="fl">Respuesta correcta</label>
          <select class="fi" id="correctOpt">
            <option value="0">A</option><option value="1">B</option>
            <option value="2">C</option><option value="3">D</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="addQuestion()">Agregar pregunta</button>
      </div>
    </div>

    <div class="sec" id="queueSec" style="display:none">
      <div class="sec-title">Cola (<span id="queueCount">0</span>)</div>
      <div class="q-list" id="queueList"></div>
    </div>
  </div>

  <!-- TAB: CHAT -->
  <div id="tab-chat" class="tab-content">
    <div class="sec">
      <div class="sec-title">Chat en vivo</div>
      <div class="chat-feed" id="chatFeed">
        <div class="cq-empty">Conecta para ver el chat</div>
      </div>
    </div>
  </div>

  <!-- TAB: RANKING -->
  <div id="tab-ranking" class="tab-content">
    <div class="sec">
      <div class="sec-title">Ranking de creditos</div>
      <div id="lbList"><div class="cq-empty">Sin datos</div></div>
      <button class="btn btn-secondary btn-full" style="margin-top:10px" onclick="socket.emit('get-leaderboard')">Actualizar</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const LETTERS = ['A','B','C','D'];
let questionQueue = [];
let currentQuestion = null;
let revealed = false;
let msgs=0,likes=0,follows=0,questions=0;

function connectTikTok(){
  const u=document.getElementById('usernameInput').value.trim().replace(/^@/,'');
  if(!u)return showToast('Ingresa un usuario','error');
  sessionStorage.setItem('tiktokUser',u);
  socket.emit('connect-tiktok',u);
  showToast('Conectando...','info');
}
function disconnectTikTok(){
  socket.emit('disconnect-tiktok');
  sessionStorage.removeItem('tiktokUser');
}
window.addEventListener('load',()=>{
  const s=sessionStorage.getItem('tiktokUser');
  if(s){document.getElementById('usernameInput').value=s;socket.emit('get-status');}
});
socket.on('current-status',(d)=>{
  if(d.connected)updateUI(true,d.username);
  else{const s=sessionStorage.getItem('tiktokUser');if(s)socket.emit('connect-tiktok',s);}
});
socket.on('tiktok-status',(d)=>{
  updateUI(d.connected,d.username||'');
  if(d.connected)showToast('Conectado a @'+d.username,'success');
  else if(d.error)showToast(d.error,'error');
});
function updateUI(on,user){
  document.getElementById('navDot').classList.toggle('on',on);
  document.getElementById('connectBtn').style.display=on?'none':'inline-flex';
  document.getElementById('disconnectBtn').style.display=on?'inline-flex':'none';
  if(on&&user)document.getElementById('usernameInput').value=user;
}

function revealAnswer(){
  socket.emit('mod-reveal-answer');
  revealed=true;
  if(currentQuestion)renderCQ(true);
  showToast('Respuesta revelada','success');
}
function nextQuestion(){
  if(questionQueue.length>0){
    currentQuestion=questionQueue.shift();
    revealed=false;
    socket.emit('mod-next-question');
    socket.emit('mod-question-added',currentQuestion);
    renderCQ(false);renderQueue();
    showToast('Siguiente pregunta enviada','success');
  } else {
    socket.emit('mod-next-question');
    currentQuestion=null;revealed=false;
    document.getElementById('cqCard').style.display='none';
    document.getElementById('cqEmpty').style.display='block';
    showToast('Siguiente','info');
  }
}
function startTimer(s){socket.emit('mod-start-timer',s);showToast('Timer '+s+'s','info');}

function addQuestion(){
  const text=document.getElementById('qText').value.trim();
  const opts=[document.getElementById('optA').value.trim(),document.getElementById('optB').value.trim(),document.getElementById('optC').value.trim(),document.getElementById('optD').value.trim()];
  const correct=parseInt(document.getElementById('correctOpt').value);
  if(!text||opts.some(o=>!o))return showToast('Completa todos los campos','error');
  const q={text,options:opts,correct};
  questionQueue.push(q);
  questions++;
  document.getElementById('sQuestions').textContent=questions;
  if(!currentQuestion){
    currentQuestion=questionQueue.shift();
    revealed=false;
    socket.emit('mod-question-added',currentQuestion);
    renderCQ(false);
  }
  renderQueue();
  showToast('Pregunta agregada','success');
  document.getElementById('qText').value='';
  ['optA','optB','optC','optD'].forEach(id=>document.getElementById(id).value='');
}

function renderCQ(showCorrect){
  const card=document.getElementById('cqCard');
  const empty=document.getElementById('cqEmpty');
  if(!currentQuestion){card.style.display='none';empty.style.display='block';return;}
  card.style.display='block';empty.style.display='none';
  document.getElementById('cqText').textContent=currentQuestion.text;
  document.getElementById('cqOpts').innerHTML=currentQuestion.options.map((o,i)=>`
    <div class="cq-opt ${showCorrect&&i===currentQuestion.correct?'correct':''}">
      <span class="cq-opt-letter">${LETTERS[i]}</span>
      <span class="cq-opt-text">${esc(o)}</span>
      ${showCorrect&&i===currentQuestion.correct?'<span style="margin-left:auto;color:var(--success)">✓</span>':''}
    </div>`).join('');
}

function renderQueue(){
  const list=document.getElementById('queueList');
  const sec=document.getElementById('queueSec');
  const cnt=document.getElementById('queueCount');
  cnt.textContent=questionQueue.length;
  sec.style.display=questionQueue.length>0?'block':'none';
  list.innerHTML=questionQueue.map((q,i)=>`
    <div class="q-item">
      <span class="q-item-num">${i+1}</span>
      <span class="q-item-text">${esc(q.text)}</span>
      <button class="q-item-del" onclick="removeQ(${i})">✕</button>
    </div>`).join('');
}
function removeQ(i){questionQueue.splice(i,1);renderQueue();}

socket.on('chat-message',(d)=>{
  msgs++;document.getElementById('sMsgs').textContent=msgs;
  const feed=document.getElementById('chatFeed');
  const ph=feed.querySelector('.cq-empty');if(ph)ph.remove();
  const u=esc(d.user||'anon'),t=esc(d.comment||''),init=u.charAt(0).toUpperCase();
  const el=document.createElement('div');el.className='cm';
  el.innerHTML=`<div class="cm-av">${init}</div><div><span class="cm-u">${u}</span><span class="cm-t">${t}</span></div>`;
  feed.appendChild(el);
  while(feed.children.length>60)feed.removeChild(feed.firstChild);
  feed.scrollTop=feed.scrollHeight;
});
socket.on('like',(d)=>{likes+=(d.likeCount||1);document.getElementById('sLikes').textContent=likes;});
socket.on('follow',()=>{follows++;document.getElementById('sFollows').textContent=follows;});

socket.on('leaderboard',(data)=>{
  const list=document.getElementById('lbList');
  if(!data||!data.length){list.innerHTML='<div class="cq-empty">Sin datos</div>';return;}
  const medals=['🥇','🥈','🥉'];
  list.innerHTML=data.slice(0,10).map((u,i)=>{
    const rank=medals[i]||('#'+(i+1));
    const color=i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#b45309':'#888';
    const init=(u.username||'?').charAt(0).toUpperCase();
    return `<div class="lb-item">
      <span class="lb-rank">${rank}</span>
      <div class="lb-av">${init}</div>
      <span class="lb-user">@${esc(u.username)}</span>
      <span class="lb-pts" style="color:${color}">${u.credits}</span>
    </div>`;
  }).join('');
});
socket.emit('get-leaderboard');
socket.on('mod-question-added',(q)=>{showToast('Pregunta recibida por el juego','success');});


function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let _tt=null;
function showToast(msg,type='info'){
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  if(_tt)clearTimeout(_tt);
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  document.body.appendChild(t);
  _tt=setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),320);},2500);
}
document.getElementById('usernameInput').addEventListener('keydown',e=>{if(e.key==='Enter')connectTikTok();});
</script></body></html>
